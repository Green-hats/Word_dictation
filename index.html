<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能单词听写系统</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --text: #182233;
            --muted: #65758b;
            --line: #d9e2ef;
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #16803d;
            --danger: #c93636;
            --warning: #b7791f;
            --shadow: 0 16px 40px rgba(24, 34, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        button,
        input {
            font: inherit;
        }

        button {
            min-height: 42px;
            padding: 0 16px;
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
        }

        button:focus-visible,
        input:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.22);
            outline-offset: 2px;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .app {
            width: min(1040px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 40px;
        }

        .topbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: clamp(28px, 5vw, 42px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
        }

        .stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .stat {
            min-width: 92px;
            padding: 10px 12px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat strong {
            display: block;
            font-size: 22px;
            line-height: 1.15;
        }

        .stat span {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .toolbar-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .mode-switcher,
        .controls,
        .settings {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mode-switcher {
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #eef3fa;
        }

        .mode-btn {
            background: transparent;
            color: var(--muted);
            border-radius: 6px;
        }

        .mode-btn.active {
            background: var(--panel);
            color: var(--primary-dark);
            border-color: var(--line);
            box-shadow: 0 6px 18px rgba(24, 34, 51, 0.08);
        }

        .primary-btn {
            background: var(--primary);
            color: #fff;
        }

        .primary-btn:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .ghost-btn {
            background: #f8fafc;
            color: var(--text);
            border-color: var(--line);
        }

        .ghost-btn:hover:not(:disabled) {
            background: #eef3fa;
        }

        .danger-btn {
            background: #fff7ed;
            color: #8a4b10;
            border-color: #f5d4a1;
        }

        .file-label {
            display: inline-flex;
            min-height: 42px;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
        }

        .file-label input {
            display: none;
        }

        .settings label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            white-space: nowrap;
        }

        .settings input {
            width: 72px;
            min-height: 38px;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            background: #fff;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1.6fr) minmax(260px, 0.8fr);
            gap: 18px;
            align-items: start;
        }

        .mode-container {
            display: none;
            min-height: 420px;
            padding: 22px;
        }

        .mode-container.active {
            display: block;
        }

        .status-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            color: var(--muted);
        }

        .progress-track {
            height: 10px;
            margin-bottom: 22px;
            border-radius: 999px;
            overflow: hidden;
            background: #e5edf7;
        }

        .progress-fill {
            width: 0;
            height: 100%;
            background: var(--primary);
            transition: width 0.2s ease;
        }

        .paper-results,
        .word-preview {
            display: grid;
            gap: 8px;
            max-height: 360px;
            overflow: auto;
            padding-right: 4px;
        }

        .result-item,
        .preview-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 38px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfdff;
        }

        .result-item.current {
            border-color: rgba(37, 99, 235, 0.5);
            background: #eef5ff;
        }

        .number {
            min-width: 30px;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        .interactive-section {
            max-width: 520px;
            margin: 0 auto;
            text-align: center;
        }

        .answer-input {
            width: 100%;
            min-height: 54px;
            margin: 18px 0 12px;
            padding: 0 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 20px;
            text-align: center;
            color: var(--text);
        }

        .answer-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .result-panel {
            min-height: 76px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfdff;
            color: var(--muted);
        }

        .result-panel.success {
            color: var(--success);
            border-color: rgba(22, 128, 61, 0.3);
            background: #f1fbf5;
        }

        .result-panel.error {
            color: var(--danger);
            border-color: rgba(201, 54, 54, 0.3);
            background: #fff5f5;
        }

        .side-panel {
            padding: 18px;
        }

        .side-panel h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .empty {
            padding: 22px;
            border: 1px dashed var(--line);
            border-radius: 8px;
            color: var(--muted);
            text-align: center;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            z-index: 10;
            max-width: min(520px, calc(100% - 32px));
            padding: 12px 16px;
            border-radius: 8px;
            background: #132033;
            color: #fff;
            box-shadow: var(--shadow);
            transform: translate(-50%, 14px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        @media (max-width: 760px) {
            .app {
                width: min(100% - 20px, 1040px);
                padding-top: 18px;
            }

            .topbar,
            .toolbar-row {
                align-items: stretch;
                flex-direction: column;
            }

            .stats,
            .controls,
            .mode-switcher,
            .settings {
                justify-content: stretch;
            }

            .stat,
            .controls button,
            .mode-switcher button,
            .file-label {
                flex: 1;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .mode-container {
                min-height: 360px;
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header class="topbar">
            <div>
                <h1>智能单词听写系统</h1>
                <p class="subtitle">导入词单后，可选择纸质听写或在线拼写练习。</p>
            </div>
            <div class="stats" aria-live="polite">
                <div class="stat">
                    <strong id="wordCount">0</strong>
                    <span>单词数</span>
                </div>
                <div class="stat">
                    <strong id="mistakeCount">0</strong>
                    <span>错误次数</span>
                </div>
            </div>
        </header>

        <section class="toolbar panel" aria-label="听写控制区">
            <div class="toolbar-row">
                <div class="mode-switcher" role="tablist" aria-label="模式切换">
                    <button class="mode-btn active" type="button" data-mode="paper" role="tab" aria-selected="true">纸质模式</button>
                    <button class="mode-btn" type="button" data-mode="interactive" role="tab" aria-selected="false">在线模式</button>
                </div>
                <label class="file-label">
                    导入词单
                    <input type="file" id="fileInput" accept=".txt,.json">
                </label>
            </div>

            <div class="toolbar-row">
                <div class="controls">
                    <button class="primary-btn" id="startBtn" type="button">开始听写</button>
                    <button class="ghost-btn" id="pauseBtn" type="button" disabled>暂停</button>
                    <button class="danger-btn" id="endBtn" type="button" disabled>结束</button>
                    <button class="ghost-btn" id="shuffleBtn" type="button" disabled>打乱顺序</button>
                </div>
                <div class="settings" aria-label="播放设置">
                    <label>语速 <input id="rateInput" type="number" min="0.5" max="1.5" step="0.1" value="0.9"></label>
                    <label>间隔 <input id="gapInput" type="number" min="0.5" max="8" step="0.5" value="1.5"></label>
                    <label>重复 <input id="repeatInput" type="number" min="1" max="3" step="1" value="1"></label>
                </div>
            </div>
        </section>

        <div class="workspace">
            <section class="panel">
                <div class="mode-container paper-mode active" id="paperMode">
                    <div class="status-line">
                        <span id="paperProgress">等待开始</span>
                        <span id="playStatus">未播放</span>
                    </div>
                    <div class="progress-track" aria-hidden="true">
                        <div class="progress-fill" id="paperProgressFill"></div>
                    </div>
                    <div class="paper-results" id="paperResults">
                        <div class="empty">导入词单并开始后，这里会显示听写进度；完成后会显示完整答案。</div>
                    </div>
                </div>

                <div class="mode-container interactive-mode" id="interactiveMode">
                    <div class="status-line">
                        <span id="interactiveProgress">等待开始</span>
                        <span id="interactiveStatus">未播放</span>
                    </div>
                    <div class="progress-track" aria-hidden="true">
                        <div class="progress-fill" id="interactiveProgressFill"></div>
                    </div>
                    <div class="interactive-section">
                        <input class="answer-input" type="text" id="answerInput" placeholder="输入拼写后按回车提交" autocomplete="off" disabled>
                        <div class="answer-actions">
                            <button class="ghost-btn" id="submitBtn" type="button" disabled>提交</button>
                            <button class="ghost-btn" id="replayBtn" type="button" disabled>重听</button>
                            <button class="ghost-btn" id="skipBtn" type="button" disabled>跳过</button>
                        </div>
                        <div class="result-panel" id="result" aria-live="polite">等待导入词单。</div>
                    </div>
                </div>
            </section>

            <aside class="side-panel panel">
                <h2>词单预览</h2>
                <div class="word-preview" id="wordPreview">
                    <div class="empty">支持 .txt 和 .json。TXT 可用换行、逗号或分号分隔。</div>
                </div>
            </aside>
        </div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        (function () {
            const MODES = {
                PAPER: 'paper',
                INTERACTIVE: 'interactive'
            };

            const STATUS = {
                STOPPED: 'stopped',
                PLAYING: 'playing',
                PAUSED: 'paused'
            };

            const STORAGE_KEY = 'word-dictation.words';

            const state = {
                currentMode: MODES.PAPER,
                status: STATUS.STOPPED,
                words: [],
                currentIndex: 0,
                mistakeCount: 0,
                runId: 0,
                toastTimer: null
            };

            const dom = {
                modeBtns: document.querySelectorAll('.mode-btn'),
                modeContainers: document.querySelectorAll('.mode-container'),
                fileInput: document.getElementById('fileInput'),
                startBtn: document.getElementById('startBtn'),
                pauseBtn: document.getElementById('pauseBtn'),
                endBtn: document.getElementById('endBtn'),
                shuffleBtn: document.getElementById('shuffleBtn'),
                rateInput: document.getElementById('rateInput'),
                gapInput: document.getElementById('gapInput'),
                repeatInput: document.getElementById('repeatInput'),
                wordCount: document.getElementById('wordCount'),
                mistakeCount: document.getElementById('mistakeCount'),
                paperProgress: document.getElementById('paperProgress'),
                paperProgressFill: document.getElementById('paperProgressFill'),
                paperResults: document.getElementById('paperResults'),
                playStatus: document.getElementById('playStatus'),
                interactiveProgress: document.getElementById('interactiveProgress'),
                interactiveProgressFill: document.getElementById('interactiveProgressFill'),
                interactiveStatus: document.getElementById('interactiveStatus'),
                answerInput: document.getElementById('answerInput'),
                submitBtn: document.getElementById('submitBtn'),
                replayBtn: document.getElementById('replayBtn'),
                skipBtn: document.getElementById('skipBtn'),
                result: document.getElementById('result'),
                wordPreview: document.getElementById('wordPreview'),
                toast: document.getElementById('toast')
            };

            const canSpeak = 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;

            const speech = {
                speak(word, runId) {
                    if (!canSpeak) {
                        return Promise.resolve(false);
                    }

                    window.speechSynthesis.cancel();

                    return new Promise((resolve) => {
                        if (runId !== state.runId || state.status === STATUS.STOPPED) {
                            resolve(false);
                            return;
                        }

                        const utterance = new SpeechSynthesisUtterance(word);
                        utterance.lang = 'en-US';
                        utterance.rate = clampNumber(dom.rateInput.value, 0.5, 1.5, 0.9);
                        utterance.onend = () => resolve(true);
                        utterance.onerror = () => resolve(false);
                        window.speechSynthesis.speak(utterance);
                    });
                },
                pause() {
                    if (canSpeak) window.speechSynthesis.pause();
                },
                resume() {
                    if (canSpeak) window.speechSynthesis.resume();
                },
                cancel() {
                    if (canSpeak) window.speechSynthesis.cancel();
                }
            };

            function clampNumber(value, min, max, fallback) {
                const parsed = Number(value);
                if (!Number.isFinite(parsed)) return fallback;
                return Math.min(max, Math.max(min, parsed));
            }

            function showToast(message) {
                window.clearTimeout(state.toastTimer);
                dom.toast.textContent = message;
                dom.toast.classList.add('show');
                state.toastTimer = window.setTimeout(() => {
                    dom.toast.classList.remove('show');
                }, 2400);
            }

            function setPanelMessage(panel, message, type) {
                panel.className = `result-panel${type ? ` ${type}` : ''}`;
                panel.textContent = message;
            }

            function normalizeAnswer(value) {
                return value
                    .trim()
                    .toLowerCase()
                    .replace(/[’']/g, "'")
                    .replace(/\s+/g, ' ');
            }

            function parseWords(fileName, text) {
                let rawWords;

                if (fileName.toLowerCase().endsWith('.json')) {
                    const json = JSON.parse(text);
                    if (!Array.isArray(json)) {
                        throw new Error('JSON 词单必须是数组。');
                    }
                    rawWords = json.map(item => {
                        if (typeof item === 'string') return item;
                        if (item && typeof item === 'object') {
                            return item.word || item.en || item.text || '';
                        }
                        return '';
                    });
                } else {
                    rawWords = text.split(/\r?\n|,|;|；|，/);
                }

                const seen = new Set();
                const words = [];
                rawWords.forEach(item => {
                    const word = String(item).trim();
                    const key = word.toLowerCase();
                    if (word && !seen.has(key)) {
                        seen.add(key);
                        words.push(word);
                    }
                });

                if (words.length === 0) {
                    throw new Error('没有找到有效单词。');
                }

                return words;
            }

            function renderList(container, words, options = {}) {
                container.replaceChildren();

                if (words.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'empty';
                    empty.textContent = options.emptyText || '暂无内容。';
                    container.append(empty);
                    return;
                }

                const fragment = document.createDocumentFragment();
                words.forEach((word, index) => {
                    const item = document.createElement('div');
                    item.className = options.currentIndex === index ? 'result-item current' : (options.compact ? 'preview-item' : 'result-item');

                    const number = document.createElement('span');
                    number.className = 'number';
                    number.textContent = `${index + 1}.`;

                    const value = document.createElement('span');
                    value.textContent = word;

                    item.append(number, value);
                    fragment.append(item);
                });
                container.append(fragment);
            }

            function updateStats() {
                dom.wordCount.textContent = String(state.words.length);
                dom.mistakeCount.textContent = String(state.mistakeCount);
            }

            function updateProgress() {
                const total = state.words.length;
                const current = total === 0 ? 0 : Math.min(state.currentIndex + 1, total);
                const finished = total === 0 ? 0 : Math.min(state.currentIndex, total);
                const percent = total === 0 ? 0 : Math.round((finished / total) * 100);

                dom.paperProgress.textContent = total ? `当前进度：${current}/${total}` : '等待开始';
                dom.interactiveProgress.textContent = total ? `当前进度：${current}/${total}` : '等待开始';
                dom.paperProgressFill.style.width = `${percent}%`;
                dom.interactiveProgressFill.style.width = `${percent}%`;
            }

            function updateControls() {
                const hasWords = state.words.length > 0;
                const isStopped = state.status === STATUS.STOPPED;
                const isPlaying = state.status === STATUS.PLAYING;
                const isInteractive = state.currentMode === MODES.INTERACTIVE;

                dom.startBtn.disabled = !hasWords || !isStopped;
                dom.pauseBtn.disabled = !hasWords || isStopped;
                dom.endBtn.disabled = !hasWords || isStopped;
                dom.shuffleBtn.disabled = !hasWords || !isStopped;
                dom.pauseBtn.textContent = state.status === STATUS.PAUSED ? '继续' : '暂停';
                dom.answerInput.disabled = !isInteractive || !isPlaying;
                dom.submitBtn.disabled = !isInteractive || !isPlaying;
                dom.replayBtn.disabled = !isInteractive || isStopped || !hasWords;
                dom.skipBtn.disabled = !isInteractive || !isPlaying;

                const label = state.status === STATUS.PLAYING ? '播放中' : state.status === STATUS.PAUSED ? '已暂停' : '未播放';
                dom.playStatus.textContent = label;
                dom.interactiveStatus.textContent = label;
                updateStats();
                updateProgress();
            }

            function switchMode(mode) {
                if (state.status !== STATUS.STOPPED) {
                    stopPlayback(false);
                }

                state.currentMode = mode;
                dom.modeBtns.forEach(btn => {
                    const selected = btn.dataset.mode === mode;
                    btn.classList.toggle('active', selected);
                    btn.setAttribute('aria-selected', String(selected));
                });
                dom.modeContainers.forEach(container => {
                    container.classList.toggle('active', container.classList.contains(`${mode}-mode`));
                });
                clearPracticeFeedback();
                updateControls();
            }

            function clearPracticeFeedback() {
                dom.answerInput.value = '';
                setPanelMessage(dom.result, state.words.length ? '准备开始在线听写。' : '等待导入词单。');
                renderPaperPlaceholder();
            }

            function renderPaperPlaceholder() {
                if (state.currentMode !== MODES.PAPER || state.status !== STATUS.STOPPED) return;
                renderList(dom.paperResults, [], {
                    emptyText: state.words.length ? '开始后会显示当前播放位置；完成后显示完整答案。' : '导入词单并开始后，这里会显示听写进度；完成后会显示完整答案。'
                });
            }

            async function delay(ms, runId) {
                const step = 80;
                let elapsed = 0;
                while (elapsed < ms) {
                    if (runId !== state.runId || state.status === STATUS.STOPPED) return false;
                    if (state.status === STATUS.PAUSED) {
                        await new Promise(resolve => window.setTimeout(resolve, step));
                        continue;
                    }
                    await new Promise(resolve => window.setTimeout(resolve, Math.min(step, ms - elapsed)));
                    elapsed += step;
                }
                return true;
            }

            async function waitWhilePaused(runId) {
                while (state.status === STATUS.PAUSED && runId === state.runId) {
                    await new Promise(resolve => window.setTimeout(resolve, 100));
                }
                return runId === state.runId && state.status !== STATUS.STOPPED;
            }

            async function speakWordWithRepeats(word, runId) {
                const repeat = Math.round(clampNumber(dom.repeatInput.value, 1, 3, 1));
                const gap = clampNumber(dom.gapInput.value, 0.5, 8, 1.5) * 1000;

                for (let count = 0; count < repeat; count++) {
                    const canContinue = await waitWhilePaused(runId);
                    if (!canContinue || state.status !== STATUS.PLAYING) return false;

                    await speech.speak(word, runId);
                    if (runId !== state.runId || state.status === STATUS.STOPPED) return false;
                    if (count < repeat - 1) {
                        const delayed = await delay(600, runId);
                        if (!delayed) return false;
                    }
                }

                return delay(gap, runId);
            }

            async function runPaperMode(runId) {
                renderList(dom.paperResults, state.words, { currentIndex: state.currentIndex });

                while (state.currentIndex < state.words.length && runId === state.runId) {
                    if (state.status === STATUS.PAUSED) {
                        await waitWhilePaused(runId);
                        continue;
                    }
                    if (state.status !== STATUS.PLAYING) break;

                    renderList(dom.paperResults, state.words, { currentIndex: state.currentIndex });
                    updateControls();

                    const spoken = await speakWordWithRepeats(state.words[state.currentIndex], runId);
                    if (!spoken || runId !== state.runId || state.status !== STATUS.PLAYING) continue;

                    state.currentIndex += 1;
                    updateControls();
                }

                if (runId === state.runId && state.status === STATUS.PLAYING && state.currentIndex >= state.words.length) {
                    finishPlayback();
                }
            }

            async function playCurrentInteractiveWord() {
                if (state.status === STATUS.STOPPED || state.currentIndex >= state.words.length) return;
                await speech.speak(state.words[state.currentIndex], state.runId);
            }

            function startPlayback() {
                if (!state.words.length) {
                    showToast('请先导入词单。');
                    return;
                }
                if (!canSpeak) {
                    showToast('当前浏览器不支持语音播放，请使用 Chrome、Edge 或 Safari。');
                    return;
                }

                state.status = STATUS.PLAYING;
                state.currentIndex = 0;
                state.mistakeCount = 0;
                state.runId += 1;
                updateControls();

                if (state.currentMode === MODES.PAPER) {
                    runPaperMode(state.runId);
                } else {
                    setPanelMessage(dom.result, '请听单词并输入拼写。');
                    dom.answerInput.value = '';
                    dom.answerInput.focus();
                    playCurrentInteractiveWord();
                }
            }

            function togglePause() {
                if (state.status === STATUS.PLAYING) {
                    state.status = STATUS.PAUSED;
                    speech.pause();
                } else if (state.status === STATUS.PAUSED) {
                    state.status = STATUS.PLAYING;
                    speech.resume();
                    if (state.currentMode === MODES.INTERACTIVE) {
                        dom.answerInput.focus();
                    }
                }
                updateControls();
            }

            function stopPlayback(showMessage) {
                state.status = STATUS.STOPPED;
                state.currentIndex = 0;
                state.runId += 1;
                speech.cancel();
                if (showMessage) {
                    showToast('听写已结束。');
                }
                clearPracticeFeedback();
                updateControls();
            }

            function finishPlayback() {
                state.status = STATUS.STOPPED;
                state.runId += 1;
                speech.cancel();

                if (state.currentMode === MODES.PAPER) {
                    state.currentIndex = state.words.length;
                    updateControls();
                    dom.paperProgressFill.style.width = '100%';
                    renderList(dom.paperResults, state.words);
                    showToast('纸质听写完成，答案已显示。');
                } else {
                    state.currentIndex = state.words.length;
                    updateControls();
                    dom.interactiveProgressFill.style.width = '100%';
                    setPanelMessage(dom.result, `听写完成，错误次数：${state.mistakeCount}`, 'success');
                    showToast('在线听写完成。');
                }
            }

            function submitAnswer() {
                if (state.currentMode !== MODES.INTERACTIVE || state.status !== STATUS.PLAYING) return;

                const correct = state.words[state.currentIndex];
                const answer = normalizeAnswer(dom.answerInput.value);

                if (!answer) {
                    showToast('请输入拼写后再提交。');
                    dom.answerInput.focus();
                    return;
                }

                if (answer === normalizeAnswer(correct)) {
                    setPanelMessage(dom.result, '正确。', 'success');
                    state.currentIndex += 1;
                    dom.answerInput.value = '';
                    updateControls();

                    if (state.currentIndex >= state.words.length) {
                        window.setTimeout(finishPlayback, 500);
                    } else {
                        window.setTimeout(() => {
                            if (state.status !== STATUS.PLAYING) return;
                            setPanelMessage(dom.result, '请听下一个单词。');
                            dom.answerInput.focus();
                            playCurrentInteractiveWord();
                        }, 650);
                    }
                } else {
                    state.mistakeCount += 1;
                    setPanelMessage(dom.result, `错误。正确答案：${correct}`, 'error');
                    dom.answerInput.value = '';
                    dom.answerInput.focus();
                    updateControls();
                }
            }

            function skipWord() {
                if (state.currentMode !== MODES.INTERACTIVE || state.status !== STATUS.PLAYING) return;
                const skipped = state.words[state.currentIndex];
                state.mistakeCount += 1;
                state.currentIndex += 1;
                dom.answerInput.value = '';
                updateControls();

                if (state.currentIndex >= state.words.length) {
                    setPanelMessage(dom.result, `已跳过：${skipped}`, 'error');
                    window.setTimeout(finishPlayback, 500);
                } else {
                    setPanelMessage(dom.result, `已跳过：${skipped}`, 'error');
                    window.setTimeout(() => {
                        if (state.status !== STATUS.PLAYING) return;
                        setPanelMessage(dom.result, '请听下一个单词。');
                        playCurrentInteractiveWord();
                        dom.answerInput.focus();
                    }, 650);
                }
            }

            function shuffleWords() {
                if (state.status !== STATUS.STOPPED || state.words.length === 0) return;
                for (let i = state.words.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [state.words[i], state.words[j]] = [state.words[j], state.words[i]];
                }
                persistWords();
                renderList(dom.wordPreview, state.words, { compact: true });
                clearPracticeFeedback();
                showToast('已打乱单词顺序。');
            }

            function persistWords() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state.words));
            }

            function loadSavedWords() {
                try {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    if (Array.isArray(saved) && saved.length) {
                        state.words = saved.filter(word => typeof word === 'string' && word.trim());
                    }
                } catch {
                    state.words = [];
                }
            }

            dom.modeBtns.forEach(btn => {
                btn.addEventListener('click', () => switchMode(btn.dataset.mode));
            });

            dom.fileInput.addEventListener('change', async event => {
                const file = event.target.files[0];
                if (!file) return;

                try {
                    const text = await file.text();
                    state.words = parseWords(file.name, text);
                    state.mistakeCount = 0;
                    state.currentIndex = 0;
                    persistWords();
                    renderList(dom.wordPreview, state.words, { compact: true });
                    clearPracticeFeedback();
                    updateControls();
                    showToast(`成功导入 ${state.words.length} 个单词。`);
                } catch (error) {
                    showToast(`导入失败：${error.message}`);
                } finally {
                    dom.fileInput.value = '';
                }
            });

            dom.startBtn.addEventListener('click', startPlayback);
            dom.pauseBtn.addEventListener('click', togglePause);
            dom.endBtn.addEventListener('click', () => stopPlayback(true));
            dom.shuffleBtn.addEventListener('click', shuffleWords);
            dom.submitBtn.addEventListener('click', submitAnswer);
            dom.replayBtn.addEventListener('click', playCurrentInteractiveWord);
            dom.skipBtn.addEventListener('click', skipWord);
            dom.answerInput.addEventListener('keydown', event => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    submitAnswer();
                }
            });

            dom.rateInput.addEventListener('change', () => {
                dom.rateInput.value = clampNumber(dom.rateInput.value, 0.5, 1.5, 0.9).toFixed(1);
            });
            dom.gapInput.addEventListener('change', () => {
                dom.gapInput.value = clampNumber(dom.gapInput.value, 0.5, 8, 1.5).toFixed(1);
            });
            dom.repeatInput.addEventListener('change', () => {
                dom.repeatInput.value = String(Math.round(clampNumber(dom.repeatInput.value, 1, 3, 1)));
            });

            loadSavedWords();
            renderList(dom.wordPreview, state.words, {
                compact: true,
                emptyText: '支持 .txt 和 .json。TXT 可用换行、逗号或分号分隔。'
            });
            clearPracticeFeedback();
            updateControls();

            if (!canSpeak) {
                showToast('当前浏览器不支持语音播放，请使用 Chrome、Edge 或 Safari。');
            }
        })();
    </script>
</body>

</html>
